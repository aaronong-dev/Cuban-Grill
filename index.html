<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Cuban Grill — Home of the Original Sloppy Cuban. Website coming soon."
    />
    <title>Cuban Grill — Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Source+Sans+3:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --navy: #0d1b2a;
        --navy-mid: #1b263b;
        --cream: #f8f4ef;
        --red: #c1121f;
        --gold: #d4a574;
        --muted: rgba(248, 244, 239, 0.72);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        font-family: "Source Sans 3", system-ui, sans-serif;
        color: var(--cream);
        background: var(--navy);
        background-image: radial-gradient(
            ellipse 120% 80% at 50% -20%,
            rgba(193, 18, 31, 0.12),
            transparent 55%
          ),
          radial-gradient(
            ellipse 80% 50% at 100% 100%,
            rgba(27, 38, 59, 0.9),
            var(--navy)
          );
      }

      .page {
        max-width: 1120px;
        margin: 0 auto;
        padding: clamp(1.5rem, 4vw, 3rem) clamp(1.25rem, 4vw, 2rem)
          clamp(2.5rem, 6vw, 4rem);
      }

      .hero {
        text-align: center;
        padding-bottom: clamp(2rem, 5vw, 3.5rem);
      }

      .logo-wrap {
        display: grid;
        place-items: center;
        width: min(300px, 78vw);
        aspect-ratio: 1;
        margin: 0 auto clamp(1.25rem, 3vw, 1.75rem);
        padding: clamp(0.08rem, 0.35vw, 0.15rem);
        background: #fff;
        border-radius: 50%;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3);
      }

      .logo {
        width: 100%;
        height: 100%;
        min-width: 0;
        min-height: 0;
        object-fit: contain;
        display: block;
      }

      .eyebrow {
        margin: 0 0 0.65rem;
        font-size: 0.8125rem;
        font-weight: 600;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--gold);
      }

      h1 {
        margin: 0 0 1rem;
        font-family: "Playfair Display", Georgia, serif;
        font-size: clamp(2.25rem, 6vw, 3.25rem);
        font-weight: 700;
        line-height: 1.15;
        letter-spacing: 0.02em;
      }

      h1 span {
        display: inline-block;
        padding-bottom: 0.35rem;
        border-bottom: 3px solid var(--red);
      }

      .lede {
        margin: 0 auto;
        max-width: 32rem;
        font-size: 1.0625rem;
        line-height: 1.55;
        color: var(--muted);
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: clamp(0.65rem, 2vw, 1rem);
      }

      .gallery figure {
        margin: 0;
        position: relative;
        border-radius: 12px;
        overflow: hidden;
        aspect-ratio: 4 / 3;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(248, 244, 239, 0.08);
      }

      .gallery img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.45s ease;
      }

      .gallery figure:hover img {
        transform: scale(1.04);
      }

      .gallery figcaption {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 0.65rem 0.75rem;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--cream);
        background: linear-gradient(
          to top,
          rgba(13, 27, 42, 0.92),
          transparent
        );
        pointer-events: none;
      }

      .footer {
        margin-top: clamp(2.25rem, 5vw, 3.25rem);
        padding-top: 1.5rem;
        border-top: 1px solid rgba(248, 244, 239, 0.12);
        text-align: center;
        font-size: 0.8125rem;
        color: var(--muted);
      }

      .footer strong {
        color: var(--cream);
        font-weight: 600;
      }

      @media (max-width: 700px) {
        .gallery {
          grid-template-columns: 1fr;
          max-width: 420px;
          margin-left: auto;
          margin-right: auto;
        }

        .gallery figure {
          aspect-ratio: 16 / 10;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero" aria-labelledby="coming-soon-heading">
        <div class="logo-wrap">
          <img
            class="logo"
            src="Cuban-Grill-Logo.png"
            alt="Cuban Grill — Sabor, Cultura, Tradición. Home of the Original Sloppy Cuban."
            width="560"
            height="560"
          />
        </div>
        <p class="eyebrow">Sabor · Cultura · Tradición</p>
        <h1 id="coming-soon-heading"><span>Coming Soon</span></h1>
        <p class="lede">
          Something delicious is on the way. Our mobile kitchen is gearing up
          to bring you the flavors you love—stay tuned.
        </p>
      </section>

      <section class="gallery" aria-label="Behind the scenes">
        <figure>
          <img
            src="photo-1.png"
            alt="Cuban Grill mobile kitchen trailer exterior"
            loading="lazy"
            width="800"
            height="600"
          />
          <figcaption>On the road</figcaption>
        </figure>
        <figure>
          <img
            src="photo-2.png"
            alt="Professional kitchen setup inside the food trailer"
            loading="lazy"
            width="800"
            height="600"
          />
          <figcaption>In the kitchen</figcaption>
        </figure>
        <figure>
          <img
            src="photo-3.png"
            alt="Cuban Grill trailer with rear service door open"
            loading="lazy"
            width="800"
            height="600"
          />
          <figcaption>Almost ready</figcaption>
        </figure>
      </section>

      <footer class="footer">
        <p>
          <strong>Chef Roberto</strong> · Est. 2006 · Home of the Original
          Sloppy Cuban
        </p>
      </footer>
    </main>
  </body>
</html>
